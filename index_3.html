<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mid film — Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080808; color:#F0EDE8; font-family:'IBM Plex Sans Arabic',sans-serif; min-height:100vh; }
header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid #222; background:#080808; position:sticky; top:0; z-index:10; }
.logo { font-size:20px; font-weight:700; } .logo span { color:#C84B0F; }
.badge { font-size:11px; color:#C84B0F; border:1px solid rgba(200,75,15,0.3); border-radius:20px; padding:4px 12px; }
.main { max-width:800px; margin:0 auto; padding:32px 20px 60px; }
.card { background:#111; border:1px solid #222; border-radius:14px; padding:22px; margin-bottom:16px; }
label { font-size:11px; color:#666; letter-spacing:1px; display:block; margin-bottom:8px; }
textarea { width:100%; background:#080808; border:1px solid #333; border-radius:10px; padding:14px; color:#F0EDE8; font-family:'IBM Plex Sans Arabic',sans-serif; font-size:14px; resize:none; min-height:80px; outline:none; direction:rtl; line-height:1.7; }
textarea:focus { border-color:#C84B0F; }
.chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.chip { background:#080808; border:1px solid #333; border-radius:7px; padding:7px 13px; font-size:12px; color:#666; cursor:pointer; font-family:'IBM Plex Sans Arabic',sans-serif; transition:all 0.15s; }
.chip.on { border-color:#C84B0F; color:#E05A1A; background:rgba(200,75,15,0.08); }
.btn { width:100%; background:#C84B0F; border:none; border-radius:12px; padding:16px; color:white; font-family:'IBM Plex Sans Arabic',sans-serif; font-size:16px; font-weight:700; cursor:pointer; margin-top:16px; transition:all 0.2s; }
.btn:hover { background:#E05A1A; transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.status { display:none; align-items:center; gap:10px; background:rgba(200,75,15,0.07); border:1px solid rgba(200,75,15,0.2); border-radius:10px; padding:12px 16px; font-size:13px; color:#E05A1A; margin-bottom:14px; }
.status.on { display:flex; }
.spin { width:14px; height:14px; border:2px solid rgba(200,75,15,0.3); border-top-color:#C84B0F; border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }
.out { background:#111; border:1px solid #222; border-radius:14px; margin-bottom:14px; overflow:hidden; opacity:0; transform:translateY(10px); transition:all 0.35s; }
.out.show { opacity:1; transform:translateY(0); }
.out-head { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #222; }
.out-title { font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; }
.out-ic { width:26px; height:26px; border-radius:7px; background:rgba(200,75,15,0.12); display:flex; align-items:center; justify-content:center; font-size:12px; }
.copy { background:#080808; border:1px solid #333; border-radius:6px; padding:4px 12px; font-size:11px; color:#666; cursor:pointer; font-family:'IBM Plex Sans Arabic',sans-serif; transition:all 0.2s; }
.copy:hover { border-color:#C84B0F; color:#C84B0F; }
.out-body { padding:18px; }
.slides { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.slide { background:#080808; border:1px solid #222; border-radius:9px; padding:12px 8px; aspect-ratio:4/5; display:flex; flex-direction:column; justify-content:space-between; }
.sn { font-size:9px; color:#C84B0F; font-weight:700; letter-spacing:1px; }
.sb { font-size:10px; color:#F0EDE8; line-height:1.5; text-align:center; flex:1; display:flex; align-items:center; justify-content:center; padding:6px 0; }
.st { font-size:8px; color:#444; direction:ltr; text-align:left; }
.caption-box { background:#080808; border:1px solid #222; border-radius:9px; padding:16px; font-size:14px; line-height:2; white-space:pre-wrap; }
.tags { display:flex; flex-wrap:wrap; gap:7px; }
.tag { background:rgba(200,75,15,0.08); border:1px solid rgba(200,75,15,0.2); border-radius:5px; padding:4px 10px; font-size:12px; color:#E05A1A; direction:ltr; }
.mj { background:#050505; border:1px solid #1a1a1a; border-radius:8px; padding:12px; margin-bottom:8px; font-size:11px; color:#777; direction:ltr; text-align:left; line-height:1.6; font-family:monospace; }
.mj-l { font-family:'IBM Plex Sans Arabic',sans-serif; color:#C84B0F; font-size:10px; margin-bottom:6px; direction:rtl; text-align:right; }
.qs { display:flex; gap:7px; flex-wrap:wrap; margin-top:12px; }
.q { background:transparent; border:1px dashed #2a2a2a; border-radius:7px; padding:6px 12px; font-size:11px; color:#555; cursor:pointer; font-family:'IBM Plex Sans Arabic',sans-serif; transition:all 0.15s; }
.q:hover { border-color:#C84B0F; color:#C84B0F; }
@media(max-width:600px) { .slides { grid-template-columns:repeat(3,1fr); } }
</style>
</head>
<body>
<header>
  <div class="logo">mid <span>film</span></div>
  <div class="badge">Gemini · DNA محلّل</div>
</header>
<div class="main">
  <div class="card">
    <label>اكتب فكرتك</label>
    <textarea id="prompt" placeholder="مثال: الذكاء الاصطناعي في الإنتاج السينمائي السعودي..."></textarea>
    <div class="qs">
      <div class="q" onclick="fill('الذكاء الاصطناعي في الإنتاج السينمائي السعودي')">🤖 AI + سينما</div>
      <div class="q" onclick="fill('أسرار الإنتاج الاحترافي من mid film')">🎬 أسرار الإنتاج</div>
      <div class="q" onclick="fill('مستقبل صناعة الفيديو في رؤية 2030')">🌟 رؤية 2030</div>
      <div class="q" onclick="fill('لماذا تختار mid film لمشروعك')">⚡ mid film والفرق</div>
    </div>
  </div>
  <div class="card" style="padding:16px">
    <label>الأسلوب</label>
    <div class="chips" id="tones">
      <div class="chip on" data-v="تعليمي">🎓 تعليمي</div>
      <div class="chip" data-v="جريء">🔥 جريء</div>
      <div class="chip" data-v="قصة شخصية">💬 قصة</div>
      <div class="chip" data-v="نصائح عملية">⚡ نصائح</div>
    </div>
  </div>
  <button class="btn" id="btn" onclick="go()">✦ توليد المحتوى</button>
  <div class="status" id="status"><div class="spin"></div><span id="stxt">يعمل...</span></div>
  <div id="out"></div>
</div>
<script>
const KEY = 'AIzaSyCUkeLV_aKfTnBgUKFLHMFISYXSTYUc85c';
const DNA = `أنت كاتب محتوى سينمائي سعودي لـ mid film — شركة إنتاج سينمائي احترافية في السعودية. المدير: موسى عمر العوبثاني. العملاء: STC، هيئة الترفيه، الخطوط السعودية. الأسلوب: سينمائي راقٍ بالعامية السعودية.`;

let tone = 'تعليمي';
document.querySelectorAll('#tones .chip').forEach(c => {
  c.onclick = () => { document.querySelectorAll('#tones .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); tone=c.dataset.v; };
});
function fill(t){ document.getElementById('prompt').value=t; }
function st(t){ document.getElementById('stxt').textContent=t; document.getElementById('status').classList.add('on'); }
function hst(){ document.getElementById('status').classList.remove('on'); }
function addOut(html, delay=0){
  setTimeout(()=>{
    const d=document.createElement('div'); d.innerHTML=html;
    const el=d.firstElementChild; document.getElementById('out').appendChild(el);
    setTimeout(()=>el.classList.add('show'),30);
  },delay);
}
function cp(btn,txt){ navigator.clipboard.writeText(txt); const o=btn.textContent; btn.textContent='✓ تم'; btn.style.color='#4CAF50'; setTimeout(()=>{btn.textContent=o;btn.style.color='';},2000); }

async function gemini(prompt, sys) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${KEY}`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      system_instruction:{ parts:[{text: DNA + '\n' + sys}] },
      contents:[{ parts:[{text: prompt}] }],
      generationConfig:{ maxOutputTokens:800, temperature:0.8 }
    })
  });
  const d = await res.json();
  if(!res.ok) throw new Error(d.error?.message || 'Error '+res.status);
  return d.candidates[0].content.parts[0].text;
}

async function go(){
  const p = document.getElementById('prompt').value.trim();
  if(!p){ document.getElementById('prompt').style.borderColor='#C84B0F'; return; }
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='⏳ يشتغل...';
  document.getElementById('out').innerHTML='';

  // 1. Slides
  st('🎬 يكتب الشرائح...');
  try {
    const raw = await gemini(
      `الموضوع: ${p}\nالأسلوب: ${tone}`,
      `اكتب 5 شرائح Carousel انستقرام بالعامية السعودية.\nأرجع JSON فقط هكذا بالضبط:\n{"s1":"نص","s2":"نص","s3":"نص","s4":"نص","s5":"نص"}`
    );
    const j = raw.slice(raw.indexOf('{'), raw.lastIndexOf('}')+1);
    const s = JSON.parse(j);
    addOut(`<div class="out">
      <div class="out-head"><div class="out-title"><div class="out-ic">🎬</div>الشرائح</div><button class="copy" onclick="cp(this,'${[s.s1,s.s2,s.s3,s.s4,s.s5].join('\\n\\n')}')">نسخ</button></div>
      <div class="out-body"><div class="slides">
        <div class="slide"><div class="sn">01 HOOK</div><div class="sb">${s.s1}</div><div class="st">hook</div></div>
        <div class="slide"><div class="sn">02</div><div class="sb">${s.s2}</div><div class="st">problem</div></div>
        <div class="slide"><div class="sn">03</div><div class="sb">${s.s3}</div><div class="st">solution</div></div>
        <div class="slide"><div class="sn">04</div><div class="sb">${s.s4}</div><div class="st">example</div></div>
        <div class="slide" style="border-color:rgba(200,75,15,0.4)"><div class="sn" style="color:#C84B0F">05 CTA</div><div class="sb">${s.s5}</div><div class="st">cta</div></div>
      </div></div>
    </div>`);
  } catch(e){ console.error(e); }

  // 2. Caption
  st('✍️ يكتب الـ Caption...');
  try {
    const cap = await gemini(
      `الموضوع: ${p}\nالأسلوب: ${tone}`,
      `اكتب Caption انستقرام بالعامية السعودية لـ mid film.\nالشكل: Hook قوي ← قيمة (3 أسطر) ← CTA\n2-3 emoji فقط.\nأرجع النص مباشرة.`
    );
    addOut(`<div class="out">
      <div class="out-head"><div class="out-title"><div class="out-ic">✍️</div>Caption</div><button class="copy" onclick="cp(this,document.getElementById('cap').textContent)">نسخ</button></div>
      <div class="out-body"><div class="caption-box" id="cap">${cap}</div></div>
    </div>`, 200);
  } catch(e){ console.error(e); }

  // 3. Hashtags
  st('# يولد Hashtags...');
  try {
    const raw2 = await gemini(
      `موضوع: ${p} — mid film السعودية`,
      `اكتب 12 hashtag: 6 عربي 6 انجليزي لـ mid film.\nأرجع JSON فقط: {"tags":["#tag1","#tag2"]}`
    );
    const j2 = raw2.slice(raw2.indexOf('{'), raw2.lastIndexOf('}')+1);
    const ht = JSON.parse(j2);
    const htHtml = ht.tags.map(t=>`<div class="tag">${t}</div>`).join('');
    const htTxt = ht.tags.join(' ');
    addOut(`<div class="out">
      <div class="out-head"><div class="out-title"><div class="out-ic">#</div>Hashtags</div><button class="copy" onclick="cp(this,'${htTxt}')">نسخ</button></div>
      <div class="out-body"><div class="tags">${htHtml}</div></div>
    </div>`, 400);
  } catch(e){ console.error(e); }

  // 4. Midjourney Prompts
  st('🎨 يولد Prompts التصميم...');
  try {
    const raw3 = await gemini(
      `موضوع: ${p}`,
      `اكتب 3 Midjourney prompts لتصاميم Carousel انستقرام لـ mid film.\nأرجع JSON فقط: {"prompts":[{"n":1,"p":"prompt هنا"},{"n":2,"p":"..."},{"n":3,"p":"..."}]}\nكل prompt بالانجليزي: dark cinematic background, burnt orange #C84B0F accents, Arabic typography, luxury Saudi film production, 8k --ar 4:5`
    );
    const j3 = raw3.slice(raw3.indexOf('{'), raw3.lastIndexOf('}')+1);
    const pm = JSON.parse(j3);
    const pmHtml = pm.prompts.map(p=>`<div class="mj"><div class="mj-l">شريحة ${p.n}</div>${p.p}</div>`).join('');
    const pmTxt = pm.prompts.map(p=>p.p).join('\n\n');
    addOut(`<div class="out">
      <div class="out-head"><div class="out-title"><div class="out-ic">🎨</div>Midjourney Prompts</div><button class="copy" onclick="cp(this,'${pmTxt.replace(/'/g,"\\'")}')">نسخ</button></div>
      <div class="out-body">${pmHtml}</div>
    </div>`, 600);
  } catch(e){ console.error(e); }

  hst();
  btn.disabled=false; btn.textContent='✦ توليد محتوى جديد';
}
</script>
</body>
</html>
